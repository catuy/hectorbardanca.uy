<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <style>
    text { fill: #000; font-family: sans-serif; font-weight: 700; font-size: 64px; }
    @media (prefers-color-scheme: dark) { text { fill: #fff; } }
    @keyframes spread {
      0%   { letter-spacing: -4px; }
      50%  { letter-spacing: 12px; }
      100% { letter-spacing: -4px; }
    }
    text { animation: spread 3s ease-in-out infinite; }
  </style>
  <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle">HB</text>
</svg>
